name: XDK tweet test

on:
  workflow_dispatch:
    inputs:
      with_media:
        description: Upload a tiny PNG and attach it to the test post
        required: false
        default: true
        type: boolean
      image_path:
        description: PNG image path to upload when with_media is enabled
        required: false
        default: scripts/fixtures/xdk-tweet-test.png
        type: string
      post_text:
        description: Optional post text. Leave empty to use a unique generated text.
        required: false
        default: ""
        type: string

env:
  TZ: Asia/Tokyo
  TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
  TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_APP_KEY: ${{ secrets.TWITTER_APP_KEY }}
  TWITTER_APP_SECRET: ${{ secrets.TWITTER_APP_SECRET }}

jobs:
  xdk-tweet-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check script
        run: deno check scripts/test_xdk_tweet.ts

      - name: Post test tweet
        env:
          WITH_MEDIA: ${{ inputs.with_media == true }}
          IMAGE_PATH: ${{ inputs.image_path }}
          POST_TEXT: ${{ inputs.post_text }}
        run: deno run --allow-env --allow-net --allow-read scripts/test_xdk_tweet.ts
