name: Twitter media upload test

on:
  workflow_dispatch:
    inputs:
      image_path:
        description: Image path to upload
        required: false
        default: scripts/fixtures/twitter-media-upload.png
        type: string
      fail_on_any_failure:
        description: Fail the job if any upload method fails
        required: false
        default: false
        type: boolean
  push:
    paths:
      - .github/workflows/twitter_media_upload_test.yml
      - scripts/test_twitter_media_upload.ts
      - scripts/fixtures/twitter-media-upload.png

env:
  TZ: Asia/Tokyo
  TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
  TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_APP_KEY: ${{ secrets.TWITTER_APP_KEY }}
  TWITTER_APP_SECRET: ${{ secrets.TWITTER_APP_SECRET }}

jobs:
  twitter-media-upload-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check script
        run: deno check scripts/test_twitter_media_upload.ts

      - name: Test media upload
        env:
          FAIL_ON_ANY_FAILURE: ${{ github.event.inputs.fail_on_any_failure || 'false' }}
        run: |
          deno run --allow-read --allow-env --allow-net scripts/test_twitter_media_upload.ts "${{ github.event.inputs.image_path || 'scripts/fixtures/twitter-media-upload.png' }}"
